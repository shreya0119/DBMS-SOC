<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Logger — {% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <span class="nav-icon">⬡</span>
        <span>SOC<strong>Logger</strong></span>
    </div>
    <ul class="nav-links">
        {% if session.get('investigator_id') %}
            <li><a href="{{ url_for('dashboard') }}" {% if request.endpoint=='dashboard' %}class="active"{% endif %}>Dashboard</a></li>
            <li><a href="{{ url_for('incidents') }}" {% if request.endpoint in ['incidents','add_incident'] %}class="active"{% endif %}>Incidents</a></li>
            <li><a href="{{ url_for('add_incident') }}">+ Add Incident</a></li>
            <li><a href="{{ url_for('alerts') }}" {% if request.endpoint=='alerts' %}class="active"{% endif %}>Alerts</a></li>
            <li><a href="{{ url_for('reports') }}" {% if request.endpoint=='reports' %}class="active"{% endif %}>Reports</a></li>
            
            <!-- User Profile & Logout -->
            <li style="margin-left: 2rem; color: var(--accent-cyan);">[{{ session.get('full_name') }}]</li>
            <li><a href="{{ url_for('logout') }}" style="color: var(--accent-red);">Logout</a></li>
        {% else %}
            <li><a href="{{ url_for('login') }}">Login</a></li>
        {% endif %}
    </ul>
</nav>

<main class="main-content">
    {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
